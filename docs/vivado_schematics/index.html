<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aring_osc — schematy Vivado (SVG)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="bar">
    <button id="back" class="back" disabled title="Wroc do poprzedniego poziomu">&#8592; Wstecz</button>
    <select id="sel" title="Schemat"></select>
    <span id="crumbs" class="crumbs"></span>
    <div class="spacer"></div>
    <button id="zoomOut" title="Pomniejsz">−</button>
    <button id="zoomIn" title="Powieksz">+</button>
    <button id="fit" title="Dopasuj do okna">Dopasuj</button>
    <button id="reset" title="100%">100%</button>
    <span id="zoomLbl" class="zoomLbl">100%</span>
  </header>

  <div id="children" class="children" hidden></div>

  <div id="viewport" class="viewport">
    <div id="canvas" class="canvas">
      <div id="svgHost"></div>
    </div>
  </div>

  <div id="tip" class="tip" hidden></div>

  <script src="./svg-bundle.js"></script>
  <script src="./data.js"></script>
  <script src="./viewer.js"></script>
</body>
</html>
